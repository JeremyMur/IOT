services:
  mqtt-broker:
    image: eclipse-mosquitto:2.0.15
    container_name: mosquitto_secure
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./passwd:/mosquitto/config/passwd
      - ./acl:/mosquitto/config/acl
      - ./certs:/mosquitto/config/certs
